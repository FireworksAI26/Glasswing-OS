# Add this file to the repo at: .github/workflows/zorin-publish.yml
# It reuses the existing DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets.
name: Build and Push Zorin OS 18 to Docker Hub

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "zorin/**"
      - ".github/workflows/zorin-publish.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: alexandermum/zorin-os-18
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./zorin
          file: ./zorin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

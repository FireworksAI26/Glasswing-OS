[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
childlogdir=/tmp

[program:dbus-system]
command=/bin/bash -lc 'mkdir -p /run/dbus && rm -f /run/dbus/pid && exec dbus-daemon --system --nofork --nopidfile'
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# Keep /run/systemd/seats absent so gnome-shell's haveSystemd() stays false
# and it uses LoginManagerDummy instead of crashing on missing logind.
# Runs as root (no user=) so it can remove root-owned runtime dirs.
[program:noseats]
command=/bin/bash -c 'while true; do rm -rf /run/systemd/seats /run/systemd/sessions /run/systemd/users 2>/dev/null || true; sleep 3; done'
autostart=true
autorestart=true
priority=6
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:xvnc]
command=/usr/bin/Xvnc %(ENV_DISPLAY)s -geometry %(ENV_WIDTH)sx%(ENV_HEIGHT)s -depth %(ENV_DEPTH)s -rfbport 5900 -rfbauth /home/zorin/.vnc/passwd -SecurityTypes VncAuth -AlwaysShared -AcceptSetDesktopSize -fp /usr/share/fonts/X11/misc
autostart=true
autorestart=true
priority=10
user=zorin
environment=HOME="/home/zorin",USER="zorin",XDG_RUNTIME_DIR="%(ENV_XDG_RUNTIME_DIR)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:gnome]
command=/bin/bash -lc 'until xdpyinfo -display "$DISPLAY" >/dev/null 2>&1; do sleep 1; done; exec /usr/local/bin/zorin-session.sh'
autostart=true
autorestart=true
priority=20
user=zorin
environment=DISPLAY="%(ENV_DISPLAY)s",HOME="/home/zorin",USER="zorin",XDG_RUNTIME_DIR="%(ENV_XDG_RUNTIME_DIR)s",WIDTH="%(ENV_WIDTH)s",HEIGHT="%(ENV_HEIGHT)s",LANG="C.UTF-8"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:novnc]
command=/usr/bin/websockify --web=/opt/zorin/www 0.0.0.0:8080 localhost:5900
autostart=true
autorestart=true
priority=40
user=zorin
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman --nodaemon
autostart=true
autorestart=true
priority=35
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:xrdp]
command=/usr/sbin/xrdp --nodaemon
autostart=true
autorestart=true
priority=36
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

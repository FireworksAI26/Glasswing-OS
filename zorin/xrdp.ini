[Globals]
ini_version=1
fork=true
port=3389
use_vnc_storage=true
security_layer=negotiate
crypt_level=high
certificate=
key_file=
tls_ciphers=HIGH
bitmap_compression=true
bitmap_cache=true
max_bpp=24
new_cursors=true
use_fastpath=both
ls_top_window_bg_color=2d2d2d
ls_width=400
ls_height=420
ls_bg_color=dedede

[Logging]
LogFile=/dev/stdout
LogLevel=INFO
EnableSyslog=false

# Single session: proxy the RDP login straight into the running TigerVNC
# desktop on 127.0.0.1:5900. The password you type at the RDP prompt is
# passed through as the VNC password (= your VNC_PASSWORD).
[Zorin OS 18]
name=Zorin OS 18
lib=libvnc.so
username=ask
password=ask
ip=127.0.0.1
port=5900
